services:
  - type: web
    name: perxia-verify-api
    runtime: docker
    repo: https://github.com/angietatianap26/perxia-verify-backend
    plan: starter
    healthCheckPath: /api/stats
    envVars:
      - key: PORT
        value: 10000
      - key: AZURE_OPENAI_ENDPOINT
        sync: false
      - key: AZURE_OPENAI_DEPLOYMENT
        sync: false
      - key: AZURE_OPENAI_API_VERSION
        sync: false
      - key: AZURE_OPENAI_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: https://perxia-verify.netlify.app
      - key: CONTRACTS_PATH
        value: /app/Contratos
    disk:
      name: perxia-data
      mountPath: /data
      sizeGB: 1
