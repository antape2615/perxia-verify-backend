services:
  - type: web
    name: perxia-verify-api
    runtime: node
    buildCommand: npm ci
    startCommand: node server.js
    plan: free
    healthCheckPath: /api/stats
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: PORT
        value: "10000"
      - key: AZURE_OPENAI_ENDPOINT
        value: https://openaiperiferiatest.openai.azure.com/
      - key: AZURE_OPENAI_DEPLOYMENT
        value: openAIJack
      - key: AZURE_OPENAI_API_VERSION
        value: 2025-01-01-preview
      - key: AZURE_OPENAI_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: https://perxia-verify.netlify.app
      - key: CONTRACTS_PATH
        value: ./Contratos
